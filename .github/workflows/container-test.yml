name: Test the Docker container

on: push

jobs:
    test_docker:
        runs-on: ubuntu-latest
        container:
            image: node:18
            env:
                NODE_ENV: development
            ports:
                - 80
            volumes:
                - my_dockervol:/volume_mount
            options: --cpus 1
        steps:
            - name: Check for docker env file
              run: (ls /.dockerenv && echo Found dockerenv) || (echo No dockerenv)                
